name: SOC MLOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/soc-mlops-platform-rf:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/soc-mlops-platform-rf:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/soc-mlops-platform-rf:latest

            docker ps -q --filter "publish=8000" | xargs -r docker stop
            docker ps -aq --filter "publish=8000" | xargs -r docker rm

            docker stop soc-mlops-platform || true
            docker rm soc-mlops-platform || true

            docker run -d \
              --restart unless-stopped \
              --name soc-mlops-platform \
              -p 8000:8000 \
              ${{ secrets.DOCKER_USERNAME }}/soc-mlops-platform-rf:latest
